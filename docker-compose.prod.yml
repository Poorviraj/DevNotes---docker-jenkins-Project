version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: devnotes-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  backend:
    image: poorviraj/devnotes-backend:latest
    container_name: devnotes-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/devnotes
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongo

  frontend:
    image: poorviraj/devnotes-frontend:latest
    container_name: devnotes-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data: